services:
  - type: web
    name: koshagar-backend
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: KOSHAGAR_DATA_DIR
        value: /var/data/koshagar
    disk:
      name: koshagar-data
      mountPath: /var/data
      sizeGB: 1
